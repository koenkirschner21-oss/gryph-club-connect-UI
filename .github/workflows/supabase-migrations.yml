# -----------------------------------------------------------------------------
# ISSUE 2 (tooling): apply pending SQL migrations to the linked Supabase project.
# Uses official CLI; secrets must match the SAME project you use in the dashboard.
# `supabase db push` only applies versions not yet in supabase_migrations — it does
# not re-insert old versions (avoids duplicate schema_migrations rows).
# -----------------------------------------------------------------------------

name: Supabase migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Check required secrets
        run: |
          test -n "${SUPABASE_ACCESS_TOKEN}" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "${SUPABASE_DB_PASSWORD}" || { echo "Missing SUPABASE_DB_PASSWORD"; exit 1; }
          test -n "${SUPABASE_PROJECT_REF}" || { echo "Missing SUPABASE_PROJECT_REF"; exit 1; }

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project & push migrations
        working-directory: .
        run: |
          set -euo pipefail
          supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"
          supabase db push
